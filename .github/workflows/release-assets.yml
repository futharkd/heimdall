name: Release Assets

on:
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always

jobs:
  upload-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: cargo build --release

      - run: |
          mkdir -p dist
          cp target/release/heimdall dist/heimdall-linux-amd64
          sha256sum dist/heimdall-linux-amd64 | awk '{print $1}' > dist/heimdall-linux-amd64.sha256

      - name: Upload assets to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/heimdall-linux-amd64 \
            dist/heimdall-linux-amd64.sha256
