stages:
  - test
  - build
  - publish

# CARGO_HOME under the repo so cache paths stay inside CI_PROJECT_DIR (GitLab requirement).
variables:
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
default:
  image: rust:1.94
  # Key from Cargo.lock: new cache when dependencies change; shared across jobs on same lockfile.
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - target/
      - .cargo/

test:fmt:
  stage: test
  script:
    - rustup component add rustfmt
    - cargo fmt --check
  allow_failure: true

test:clippy:
  stage: test
  script:
    - rustup component add clippy
    - cargo clippy --all-targets --all-features -- -D warnings

test:test:
  stage: test
  script:
    - cargo test --all-targets --all-features

build:linux-amd64:
  stage: build
  script:
    - cargo build --release
    - mkdir -p dist
    - cp target/release/heimdall dist/heimdall-linux-amd64
    - sha256sum dist/heimdall-linux-amd64 > dist/heimdall-linux-amd64.sha256
  artifacts:
    expire_in: 30 days
    paths:
      - dist/heimdall-linux-amd64
      - dist/heimdall-linux-amd64.sha256

publish:package:
  stage: publish
  image: curlimages/curl:8.11.1
  cache: []
  needs:
    - job: build:linux-amd64
      artifacts: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'
  script:
    - export PACKAGE_NAME="heimdall"
    - export PACKAGE_VERSION="${CI_COMMIT_TAG:-latest}"
    - export BASE_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${PACKAGE_VERSION}"
    - 'curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file dist/heimdall-linux-amd64 "${BASE_URL}/heimdall-linux-amd64"'
    - 'curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file dist/heimdall-linux-amd64.sha256 "${BASE_URL}/heimdall-linux-amd64.sha256"'
